<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Crear Factura</title>
</head>
<body>

<h2>Nueva Factura</h2>

<form th:action="@{/facturas/guardar}" method="post" th:object="${factura}">

  <label>Total</label>
  <input type="number" step="0.01" th:field="*{total}" />

  <button type="submit">Guardar</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">
  <title>Panel Vendedor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div th:replace="~{fragments/navbar-vendedor :: navbar}"></div>

<div class="container mt-4">

  <h2 class="mb-4">Panel del vendedor</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="card shadow">

        <div class="card-body text-center">

          <h4>Productos</h4>

          <p>Administrar productos</p>

          <a th:href="@{/productos}"
             class="btn btn-primary">
            Ver productos
          </a>

        </div>

      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow">

        <div class="card-body text-center">

          <h4>Registrar producto</h4>

          <p>Agregar nuevos productos</p>

          <a th:href="@{/productos/nuevo}"
             class="btn btn-success">
            Nuevo producto
          </a>

        </div>

      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow">

        <div class="card-body text-center">

          <h4>Pedidos</h4>

          <p>Ver pedidos de clientes</p>

          <a th:href="@{/pedidos}"
             class="btn btn-warning">
            Ver pedidos
          </a>

        </div>

      </div>
    </div>

  </div>

</div>

</body>

</html>

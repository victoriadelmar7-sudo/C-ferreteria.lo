<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Panel Administrador</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div th:replace="~{fragments/navbar-admin :: navbar}"></div>

<main>

  <h3 style="text-align:center; margin-bottom:20px;">
    Bienvenido, Administrador 👋
  </h3>

  <div class="contenedor-productos">

    <!-- Usuarios -->
    <div class="card" onclick="location.href='/usuarios/vista'" style="cursor:pointer;">
      <h4>Usuarios</h4>
      <p>Administrar usuarios del sistema</p>
      <a th:href="@{/usuarios/vista}" class="btn btn-primary">
        Ver usuarios
      </a>
    </div>

    <!-- Productos -->
    <div class="card" onclick="location.href='/productos/admin'" style="cursor:pointer;">
      <h4>Productos</h4>
      <p>Administrar productos</p>
      <a th:href="@{/productos/admin}" class="btn btn-success">
        Ver productos
      </a>
    </div>

    <!-- Categorías -->
    <div class="card" onclick="location.href='/categorias'" style="cursor:pointer;">
      <h4>Categorías</h4>
      <p>Administrar categorías</p>
      <a th:href="@{/categorias}" class="btn btn-warning">
        Ver categorías
      </a>
    </div>

    <!-- Pedidos -->
    <div class="card" onclick="location.href='/admin/pedidos'" style="cursor:pointer;">
      <h4>Pedidos</h4>
      <p>Historial de pedidos realizados</p>
      <a th:href="@{/admin/pedidos}" class="btn btn-info">
        Ver pedidos
      </a>
    </div>

  </div>



</main>

</body>
</html>
